name: Build Mock Card APK

on:
  workflow_dispatch:
  push:
    paths:
      - "result/mock_card_island_app/**"
      - ".github/workflows/build-mock-card-apk.yml"
  pull_request:
    paths:
      - "result/mock_card_island_app/**"
      - ".github/workflows/build-mock-card-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Assemble debug APK
        working-directory: result/mock_card_island_app
        run: gradle --no-daemon assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mock-card-debug-apk
          path: result/mock_card_island_app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
